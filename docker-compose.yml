services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mosquito
      POSTGRES_PASSWORD: mosquito
      POSTGRES_DB: mosquito_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosquito -d mosquito_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto:/mosquitto/config
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t healthcheck -n -q 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mosquito:mosquito@db:5432/mosquito_dashboard
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

volumes:
  postgres_data: